<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Панорама проекта</title>
  <!-- Подключаем CSS и JS PhotoSphereViewer -->
  <link rel="stylesheet" href="https://photo-sphere-viewer.js.org/3.5/dist/photo-sphere-viewer.css" />
  <script src="https://photo-sphere-viewer.js.org/3.5/dist/photo-sphere-viewer.min.js"></script>
  <!-- Стили для полного экрана -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    #viewer {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>

<!-- Контейнер для панорамы -->
<div id="viewer"></div>

<script>
  // Инициализация панорамы
  const viewer = new PhotoSphereViewer({
    container: 'viewer',
    panorama: '360_1.jpg', // Убедись, что файл называется именно так!
    defaultZoomLvl: 50,
    loadingImg: 'https://photo-sphere-viewer.js.org/3.5/assets/loading.gif',
    navbar: true,
    timeAnimate: 1000,
  });
</script>

</body>
</html>
