<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <!-- Настройка для корректного отображения на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>360° Panorama</title>
    
    <!-- Подключаем стили библиотеки Pannellum из надежного источника -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    
    <style>
        /* Убираем все отступы, чтобы панорама была на весь экран */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Запрещаем прокрутку страницы */
            background-color: #0.0; /* Черный фон, пока грузится фото */
        }
        #panorama {
            width: 100%;
            height: 100vh; /* Панорама занимает 100% высоты окна */
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<!-- Подключаем движок панорамы -->
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
    // ВНИМАНИЕ: Проверь имя файла ниже! 
    // Оно должно ТОЧНО совпадать с тем, что ты загрузил на GitHub.
    const myImageName = "360_1.jpg"; 

    pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": myImageName, 
        "autoLoad": true,      // Автозагрузка при открытии
        "autoRotate": -2,     // Легкое вращение для эффекта жизни
        "title": "360 Панорама",
        "author": "VizTemplate"
    });
</script>

</body>
</html>
