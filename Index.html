<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device_width, initial-scale=1.0">
    <title>360° Panorama View</title>
    <link rel="</strong>rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        #panorama { width: 100%; height: 100vh; }
    </style>
</head>
<body style="margin:0;">
<div id="panorama"></div>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<script>
    pannellum.viewer('panorama', {
        "type": "equirectangular",
        // ТУТ ВАЖНО: Имя файла должно СТРОГО совпадать с тем, что ты загрузил!
        "panorama": "36_1.jpg", 
        "autoLoad": true,
        "autoRotate": -2,
        "title": "My New 360 Tour",
        "author": "VizTemplate"
    });
</script>
</body>
</html>
