<!DOCTYPE HTML>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Panorama View</title>
    
    <meta property="og:title" content="360 Panorama View">
    <meta property="og:description" content="Интерактивный 3D тур по помещению. Нажмите, чтобы осмотреться!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://viztemplate.github.io/360-panorama-tour/Dserjinsky/1.vanaya">
    
    <!-- Картинка-превью для карточки (замени на свою прямую ссылку на фото) -->
    <meta property="og:image" content="https://viztemplate.github.io/360-panorama-tour/Dserjinsky/1.vanaya/360_1.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <link rel="preflight" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    
     <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; padding: 0; background: #000; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
    "type": "equirectangular",
    "panorama": "360_1.jpg", // ИМЯ ВАШЕГО ФАЙЛА ДОЛЖНО БЫТЬ ТАКИМ ЖЕ
    "autoLoad": true,
    "autoRotate": -2 // Автоматическое вращение (можно убрать)
});
</script>

</body>
</html>
